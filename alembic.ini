# Alembic configuration. Database URL is loaded from heaven.config at runtime
# (see migrations/env.py). To override, set HEAVEN_DB_PASSWORD etc. as env vars.

[alembic]
script_location = migrations
prepend_sys_path = .
timezone = UTC
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_path_separator = os
output_encoding = utf-8

# sqlalchemy.url is set programmatically in env.py — leave blank here so a
# misconfigured environment fails loudly rather than silently using SQLite.
sqlalchemy.url =


[post_write_hooks]
# Auto-format generated migrations
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
